# Phase 1 v6 — RL refinement of Phase 0c v1.
#
# v3/v4/v5 all degraded Phase 0b because the value head was broken
# (near-constant predictions → more MCTS sims actually hurt).
#
# Phase 0c fixed the root cause: max_moves_per_player=200 in data gen
# gave the teacher enough moves to reach endgame in 4P/6P, producing
# varied value targets. Result: sims=100 now IMPROVES play (6P: 5.25→9.0
# pins), proving the value head works. RL should no longer degrade the
# policy.
#
# Additional safety: endgame solver handles goal stalling at competition
# time, max_moves=200/player matches supervised data, KL anchor prevents
# drift.
#
# Launch:
#   python3 train.py \
#     --config configs/phase1_v6.yaml \
#     --resume checkpoints/phase_0c_v1/model_best.pt \
#     --kl-anchor checkpoints/phase_0c_v1/model_best.pt \
#     --device cuda \
#     --phase rl_refine \
#     --run-name phase1_v6

model:
  num_res_blocks: 6
  trunk_channels: 128
  policy_channels: 32
  value_hidden: 128

training:
  num_iterations: 50
  num_games_per_iteration: 30
  num_players: "2,4,6"
  batch_size: 256
  epochs_per_iteration: 5
  learning_rate: 0.0001
  weight_decay: 0.0001
  policy_loss_weight: 1.0
  value_loss_weight: 1.0
  buffer_capacity: 200000
  min_buffer_size: 512
  temperature: 1.0
  checkpoint_dir: checkpoints
  checkpoint_every: 10
  eval_every: 5
  device: cuda
  freeze_policy: false
  kl_anchor_weight: 0.3
  opponent: mixed
  include_anchor_as_opponent: true
  max_moves_per_player: 200
  gate_baseline:
    self_play_pins: 7.0
    4p_vs_greedy_pins: 5.0
    2p_vs_heuristic_pins: 8.0
  gate_tolerance: 1.0
  gate_grace_iterations: 20

mcts:
  num_simulations: 50
  c_puct: 1.5
  temperature: 1.0

rewards:
  win_reward: 1.0
  loss_reward: -1.0
  draw_reward: -0.5
  max_moves_reward: -0.3
  pin_goal_weight: 0.3
  distance_weight: 0.01
  lagging_weight: -0.005
  home_exit_weight: 0.05
  mobility_weight: 0.001
  use_score_terminal: true
  score_normalization: 1300.0
  use_score_margin: false

evaluation:
  kind: phase1
  matchups:
    - 2p_vs_random
    - 2p_vs_greedy
    - 2p_vs_heuristic
    - 2p_self_play
    - 4p_vs_greedy
    - 6p_vs_greedy
  games_per_matchup: 4
  mcts_sims: 50
