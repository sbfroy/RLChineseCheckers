# Phase 1a: Fix the value head.
# Resumes from Phase 0 supervised checkpoint with policy FROZEN.
# Self-play at MCTS 20 generates varied game outcomes; only the value
# head trains on discounted returns. Zero risk to the working policy.
#
# Gate: eval at MCTS 50 should score HIGHER than Phase 0 at MCTS 20.
# If the value head is working, more search = better play.

model:
  num_res_blocks: 6
  trunk_channels: 128
  policy_channels: 32
  value_hidden: 128

training:
  num_iterations: 30
  num_games_per_iteration: 60
  num_players: 2
  batch_size: 256
  epochs_per_iteration: 10
  learning_rate: 0.0003
  weight_decay: 0.0001
  policy_loss_weight: 1.0
  value_loss_weight: 1.0
  buffer_capacity: 200000
  min_buffer_size: 512
  temperature: 1.0
  checkpoint_dir: checkpoints
  checkpoint_every: 5
  eval_every: 5
  device: cuda
  freeze_policy: true

mcts:
  num_simulations: 20
  c_puct: 1.5
  temperature: 1.0

rewards:
  win_reward: 1.0
  loss_reward: -1.0
  draw_reward: -0.5
  max_moves_reward: -0.3
  pin_goal_weight: 0.3
  distance_weight: 0.01
  lagging_weight: -0.005
  home_exit_weight: 0.05
  mobility_weight: 0.001
  use_score_terminal: true
  score_normalization: 1300.0
  use_score_margin: false

evaluation:
  num_games: 10
  num_players: 2
