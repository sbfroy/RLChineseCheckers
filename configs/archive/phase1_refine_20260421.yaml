# Phase 1: AlphaZero refinement from supervised bootstrap checkpoint.
# Resumes from a Phase 0 model (from training/supervised_bootstrap.py).
# Goal: push past heuristic-level play via MCTS + self-play against heuristic.
#
# Key differences vs mcts_light.yaml:
#   - Lower learning rate (fine-tuning, not from scratch)
#   - 100 MCTS sims (stronger tree search, network is competent now)
#   - Scaled-up per-step rewards (pins actually reach goal, rewards are meaningful)
#   - Score-margin terminal (real variance when RL plays at heuristic level)
#   - Short run (30 iters) to validate before longer training

model:
  num_res_blocks: 6
  trunk_channels: 128
  policy_channels: 32
  value_hidden: 128

training:
  num_iterations: 10
  num_games_per_iteration: 40
  num_players: 2
  batch_size: 128
  epochs_per_iteration: 5
  learning_rate: 0.00003
  weight_decay: 0.0001
  policy_loss_weight: 1.0
  value_loss_weight: 1.0
  buffer_capacity: 200000
  min_buffer_size: 512
  temperature: 1.0
  checkpoint_dir: checkpoints
  checkpoint_every: 5
  eval_every: 5
  device: cuda
  opponent: self

mcts:
  num_simulations: 100
  c_puct: 1.5
  temperature: 1.0

rewards:
  win_reward: 1.0
  loss_reward: -1.0
  draw_reward: -0.5
  max_moves_reward: -0.3
  pin_goal_weight: 0.5
  distance_weight: 0.05
  lagging_weight: -0.01
  home_exit_weight: 0.1
  mobility_weight: 0.0
  use_score_terminal: true
  score_normalization: 1300.0
  use_score_margin: true

evaluation:
  num_games: 5
  num_players: 2
