# MCTS Light training config (Phase 2) — vs heuristic opponent
# 50 MCTS simulations during self-play
# Trains against HeuristicAgent to break self-play symmetry

model:
  num_res_blocks: 6
  trunk_channels: 128
  policy_channels: 32
  value_hidden: 128

training:
  num_iterations: 50
  num_games_per_iteration: 40
  num_players: 2
  batch_size: 128
  epochs_per_iteration: 5
  learning_rate: 0.001
  weight_decay: 0.0001
  policy_loss_weight: 1.0
  value_loss_weight: 1.0
  buffer_capacity: 200000
  min_buffer_size: 512
  temperature: 1.0
  checkpoint_dir: checkpoints
  checkpoint_every: 10
  eval_every: 10
  device: cuda
  opponent: heuristic

mcts:
  num_simulations: 50
  c_puct: 1.5
  temperature: 1.0

rewards:
  win_reward: 1.0
  loss_reward: -1.0
  draw_reward: -0.5
  max_moves_reward: -0.3
  pin_goal_weight: 0.1
  distance_weight: 0.01
  lagging_weight: -0.001
  home_exit_weight: 0.02
  mobility_weight: 0.0
  use_score_terminal: true
  score_normalization: 1300.0

evaluation:
  num_games: 20
  num_players: 2
