# Phase 1 v4 — RL refinement of Phase 0b v1 (fixes v3's max_moves bug).
#
# v3 auto-stopped at iteration 10: 100% of training games hit the 300-move
# ceiling because max_moves was a flat total, not per-player. In a 6P game
# each player only got 50 turns — far too few to finish. The agent never
# saw endgame positions during training, so the value head learned nothing
# and the policy drifted.
#
# v4 fixes:
#  * max_moves_per_player: 150 → 2P gets 300, 4P gets 600, 6P gets 900
#  * KL anchor weight 0.1 → 0.3 (v3's 0.1 wasn't enough to prevent
#    the 2p_vs_heuristic collapse from 7 → 3.5 pins in 5 iterations)
#  * Everything else from v3 is unchanged and already verified.
#
# Launch (the user runs this):
#
#   python3 train.py \
#     --config configs/phase1_v4.yaml \
#     --resume checkpoints/phase_0b_v1/model_best.pt \
#     --kl-anchor checkpoints/phase_0b_v1/model_best.pt \
#     --device cuda \
#     --phase rl_refine \
#     --run-name phase1_v4_<run_id>

model:
  num_res_blocks: 6
  trunk_channels: 128
  policy_channels: 32
  value_hidden: 128

training:
  num_iterations: 100
  num_games_per_iteration: 30
  num_players: "2,4,6"
  batch_size: 256
  epochs_per_iteration: 5
  learning_rate: 0.0001
  weight_decay: 0.0001
  policy_loss_weight: 1.0
  value_loss_weight: 1.0
  buffer_capacity: 200000
  min_buffer_size: 512
  temperature: 1.0
  checkpoint_dir: checkpoints
  checkpoint_every: 10
  eval_every: 5
  device: cuda
  freeze_policy: false
  kl_anchor_weight: 0.3
  opponent: mixed
  include_anchor_as_opponent: true
  max_moves_per_player: 150
  gate_baseline:
    self_play_pins: 7.0
    4p_vs_greedy_pins: 8.0
    2p_vs_heuristic_pins: 6.3
  gate_tolerance: 1.0
  gate_grace_iterations: 5

mcts:
  num_simulations: 50
  c_puct: 1.5
  temperature: 1.0

rewards:
  win_reward: 1.0
  loss_reward: -1.0
  draw_reward: -0.5
  max_moves_reward: -0.3
  pin_goal_weight: 0.3
  distance_weight: 0.01
  lagging_weight: -0.005
  home_exit_weight: 0.05
  mobility_weight: 0.001
  use_score_terminal: true
  score_normalization: 1300.0
  use_score_margin: false

evaluation:
  kind: phase1
  matchups:
    - 2p_vs_random
    - 2p_vs_greedy
    - 2p_vs_heuristic
    - 2p_self_play
    - 4p_vs_greedy
    - 6p_vs_greedy
  games_per_matchup: 2
  mcts_sims: 20
