# Phase 1 v5 — RL refinement of Phase 0b v1.
#
# v4 auto-stopped at iteration 5 (the very first eval). Two problems:
#  1. Gate had zero effective grace: gate_grace=5 with eval_every=5
#     means the first eval IS the gate check. With only 2 eval games
#     the measurement is extremely noisy.
#  2. 4P/6P games still hit max_moves. This is structural — 40-60 pins
#     on 121 cells create congestion no agent can resolve. But 2P
#     self-play CAN finish (214 moves avg), and shaped rewards still
#     provide signal from stalled games (v4's value loss dropped
#     1.14 → 0.74 in 5 iterations).
#
# v5 fixes:
#  * gate_grace_iterations: 5 → 15 (3 evals before the gate activates)
#  * games_per_matchup: 2 → 4 (less noise in gate measurements)
#  * MCTS sims for data gen: 50 → 25 (2P games more likely to finish;
#    lower sims avoids the value-head pathology from Phase 0)
#
# Launch:
#   python3 train.py \
#     --config configs/phase1_v5.yaml \
#     --resume checkpoints/phase_0b_v1/model_best.pt \
#     --kl-anchor checkpoints/phase_0b_v1/model_best.pt \
#     --device cuda \
#     --phase rl_refine \
#     --run-name phase1_v5_<run_id>

model:
  num_res_blocks: 6
  trunk_channels: 128
  policy_channels: 32
  value_hidden: 128

training:
  num_iterations: 100
  num_games_per_iteration: 30
  num_players: "2,4,6"
  batch_size: 256
  epochs_per_iteration: 5
  learning_rate: 0.0001
  weight_decay: 0.0001
  policy_loss_weight: 1.0
  value_loss_weight: 1.0
  buffer_capacity: 200000
  min_buffer_size: 512
  temperature: 1.0
  checkpoint_dir: checkpoints
  checkpoint_every: 10
  eval_every: 5
  device: cuda
  freeze_policy: false
  kl_anchor_weight: 0.3
  opponent: mixed
  include_anchor_as_opponent: true
  max_moves_per_player: 150
  gate_baseline:
    self_play_pins: 7.0
    4p_vs_greedy_pins: 8.0
    2p_vs_heuristic_pins: 6.3
  gate_tolerance: 1.0
  gate_grace_iterations: 15

mcts:
  num_simulations: 25
  c_puct: 1.5
  temperature: 1.0

rewards:
  win_reward: 1.0
  loss_reward: -1.0
  draw_reward: -0.5
  max_moves_reward: -0.3
  pin_goal_weight: 0.3
  distance_weight: 0.01
  lagging_weight: -0.005
  home_exit_weight: 0.05
  mobility_weight: 0.001
  use_score_terminal: true
  score_normalization: 1300.0
  use_score_margin: false

evaluation:
  kind: phase1
  matchups:
    - 2p_vs_random
    - 2p_vs_greedy
    - 2p_vs_heuristic
    - 2p_self_play
    - 4p_vs_greedy
    - 6p_vs_greedy
  games_per_matchup: 4
  mcts_sims: 20
